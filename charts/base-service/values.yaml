replicaCount: 3

image:
  repository: fintech/service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env: {}

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: service.local
      paths:
        - path: /
          pathType: Prefix

monitoring:
  enabled: true
  securePort: 9090
  interval: 30s

networkPolicy:
  enabled: true

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1
