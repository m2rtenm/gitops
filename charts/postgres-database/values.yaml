image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432
  targetPort: 5432

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: true
  storageClassName: standard
  size: 10Gi
  mountPath: /var/lib/postgresql/data

env:
  POSTGRES_DB: database
  POSTGRES_USER: dbuser
  # set the superuser password; required by the official image
  # e.g. POSTGRES_PASSWORD: "securepass"
  # you can also set this in your service-specific values file
  # POSTGRES_INITDB_ARGS can be added here if desired, but note that
  # initdb does not accept '-c'; use a custom configmap instead for
  # server parameters.

backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 7

monitoring:
  enabled: true
  interval: 30s
