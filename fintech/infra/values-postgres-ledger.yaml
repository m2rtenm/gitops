image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432
  targetPort: 5432

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: true
  storageClassName: ""  # leave empty to use cluster default storage class
  size: 10Gi
  mountPath: /var/lib/postgresql/data

env:
  POSTGRES_DB: ledger_db
  POSTGRES_USER: ledger_user
  POSTGRES_PASSWORD: ledgerpass
  # POSTGRES_INITDB_ARGS removed; use configmap for server settings

backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 7

monitoring:
  enabled: true
  interval: 30s
