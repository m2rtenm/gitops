image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432
  targetPort: 5432

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 125m
    memory: 128Mi

persistence:
  enabled: true
  storageClassName: ""  # leave empty to use cluster default storage class
  size: 5Gi
  mountPath: /var/lib/postgresql/data

env:
  POSTGRES_DB: audit_db
  POSTGRES_USER: audit_user
  POSTGRES_PASSWORD: auditpass
  # POSTGRES_INITDB_ARGS removed; see chart documentation for alternatives

backup:
  enabled: true
  schedule: "0 3 * * *"
  retention: 30

monitoring:
  enabled: true
  interval: 30s
