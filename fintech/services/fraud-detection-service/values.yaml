replicaCount: 2

image:
  repository: fintech/fraud-detection-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  SERVICE_NAME: fraud-detection-service
  LOG_LEVEL: INFO
  KAFKA_BROKERS: kafka-broker-0.kafka-headless.strimzi-system.svc.cluster.local:9092,kafka-broker-1.kafka-headless.strimzi-system.svc.cluster.local:9092,kafka-broker-2.kafka-headless.strimzi-system.svc.cluster.local:9092
  KAFKA_TOPIC_TRANSACTIONS: fintech.transactions
  KAFKA_TOPIC_ALERTS: fintech.fraud-alerts
  KAFKA_CONSUMER_GROUP: fraud-detection-service
  POSTGRES_HOST: postgres-audit.fintech-infra.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: audit_db
  POSTGRES_USER: audit_user
  POSTGRES_PASSWORD: auditpass

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: fraud-detection-service.local
      paths:
        - path: /
          pathType: Prefix

monitoring:
  enabled: true
  securePort: 9090
  interval: 30s

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1
