replicaCount: 3

image:
  repository: fintech/transaction-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env:
  SERVICE_NAME: transaction-service
  LOG_LEVEL: INFO
  KAFKA_BROKERS: kafka-broker-0.kafka-headless.strimzi-system.svc.cluster.local:9092,kafka-broker-1.kafka-headless.strimzi-system.svc.cluster.local:9092,kafka-broker-2.kafka-headless.strimzi-system.svc.cluster.local:9092
  KAFKA_TOPIC_TRANSACTIONS: fintech.transactions
  KAFKA_TOPIC_EVENTS: fintech.transaction-events
  KAFKA_CONSUMER_GROUP: transaction-service
  POSTGRES_HOST: postgres-accounts.fintech-infra.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: accounts_db
  POSTGRES_USER: accounts_user
  POSTGRES_PASSWORD: accountspass

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: transaction-service.local
      paths:
        - path: /
          pathType: Prefix

monitoring:
  enabled: true
  securePort: 9090
  interval: 30s

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1
