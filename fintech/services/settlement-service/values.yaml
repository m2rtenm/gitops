replicaCount: 2

image:
  repository: fintech/settlement-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 750m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

env:
  SERVICE_NAME: settlement-service
  LOG_LEVEL: INFO
  KAFKA_BROKERS: kafka-broker-0.kafka-headless:9092,kafka-broker-1.kafka-headless:9092,kafka-broker-2.kafka-headless:9092
  KAFKA_TOPIC_SETTLEMENT: fintech.settlement
  KAFKA_TOPIC_EVENTS: fintech.settlement-events
  KAFKA_CONSUMER_GROUP: settlement-service
  POSTGRES_HOST: postgres-ledger
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ledger_db
  POSTGRES_USER: ledger_user

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: settlement-service.local
      paths:
        - path: /
          pathType: Prefix

monitoring:
  enabled: true
  securePort: 9090
  interval: 30s

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1
